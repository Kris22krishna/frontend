<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trig Wave Builder</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=JetBrains+Mono:wght@500;700&display=swap');
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 20px;
            background: #f0fdf4;
            color: #1e293b;
            font-family: 'Outfit', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }
        .header { text-align: center; margin-bottom: 16px; }
        h2 { margin: 0; font-size: 22px; font-weight: 800; color: #1e293b; }
        p  { margin: 4px 0 0; color: #64748b; font-size: 13.5px; }
        
        .controls {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            background: #ffffff;
            padding: 12px 24px;
            border-radius: 100px;
            border: 1.5px solid #bbf7d0;
            box-shadow: 0 2px 12px rgba(16, 185, 129, 0.10);
        }
        button {
            background: #10b981;
            color: white;
            border: none;
            padding: 9px 22px;
            border-radius: 100px;
            font-weight: 700;
            font-family: 'Outfit', sans-serif;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover { background: #059669; }
        button.paused { background: #6366f1; }
        button.reset-btn { background: #f8fafc; color: #64748b; border: 1.5px solid #e2e8f0; }
        button.reset-btn:hover { background: #f1f5f9; }
        
        .canvas-container {
            flex: 1;
            width: 100%;
            max-width: 1000px;
            background: #ffffff;
            border-radius: 20px;
            border: 1.5px solid #bbf7d0;
            box-shadow: 0 6px 24px rgba(16, 185, 129, 0.10);
            overflow: hidden;
        }
        canvas { display: block; width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div class="header">
        <h2>Sine Wave Builder</h2>
        <p>Watch how the height of the unit circle traces out the Sine wave over time.</p>
    </div>

    <div class="controls">
        <button id="btnPlay">▶ Play</button>
        <button class="reset-btn" id="btnReset">↺ Reset</button>
    </div>

    <div class="canvas-container" id="container">
        <canvas id="waveCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('waveCanvas');
        const ctx    = canvas.getContext('2d');
        const container = document.getElementById('container');
        
        let width, height;
        let time = 0;
        let isPlaying = false;
        let animationId;
        const history = [];

        function resize() {
            width  = container.clientWidth;
            height = container.clientHeight;
            canvas.width  = width;
            canvas.height = height;
            draw();
        }
        window.addEventListener('resize', resize);

        function draw() {
            ctx.clearRect(0, 0, width, height);

            // Light background
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, width, height);

            const circleRadius = Math.min(height * 0.36, 100);
            const circleCenter = { x: circleRadius + 44, y: height / 2 };
            const waveStartX   = circleCenter.x + circleRadius + 40;

            // Axes
            ctx.strokeStyle = '#e2e8f0';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(0, circleCenter.y); ctx.lineTo(width, circleCenter.y);
            ctx.moveTo(circleCenter.x, 0); ctx.lineTo(circleCenter.x, height);
            ctx.stroke();

            // Circle
            ctx.strokeStyle = '#86efac';
            ctx.lineWidth = 2.5;
            ctx.beginPath();
            ctx.arc(circleCenter.x, circleCenter.y, circleRadius, 0, Math.PI * 2);
            ctx.stroke();

            // Current point on circle
            const px = circleCenter.x + Math.cos(time) * circleRadius;
            const py = circleCenter.y - Math.sin(time) * circleRadius;

            // Radius line
            ctx.strokeStyle = '#94a3b8';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(circleCenter.x, circleCenter.y);
            ctx.lineTo(px, py);
            ctx.stroke();

            // Point on circle
            ctx.fillStyle = '#ef4444';
            ctx.beginPath();
            ctx.arc(px, py, 7, 0, Math.PI * 2);
            ctx.fill();

            // Store history
            history.unshift(py);
            if (history.length > width - waveStartX) history.pop();

            // Tracing dashed line
            ctx.strokeStyle = 'rgba(239, 68, 68, 0.35)';
            ctx.lineWidth = 1.5;
            ctx.setLineDash([5, 5]);
            ctx.beginPath();
            ctx.moveTo(px, py);
            ctx.lineTo(waveStartX, py);
            ctx.stroke();
            ctx.setLineDash([]);

            // Wave
            ctx.strokeStyle = '#ef4444';
            ctx.lineWidth = 3;
            ctx.beginPath();
            for (let i = 0; i < history.length; i++) {
                const x = waveStartX + i;
                if (i === 0) ctx.moveTo(x, history[i]);
                else ctx.lineTo(x, history[i]);
            }
            ctx.stroke();

            // Leading dot on wave
            if (history.length > 0) {
                ctx.fillStyle = '#ef4444';
                ctx.beginPath();
                ctx.arc(waveStartX, history[0], 7, 0, Math.PI * 2);
                ctx.fill();
            }

            // Label
            ctx.fillStyle = '#64748b';
            ctx.font = '600 13px Outfit';
            ctx.fillText('y = sin(θ)', waveStartX + 12, circleCenter.y - circleRadius - 10);

            if (isPlaying) {
                time += 0.03;
                animationId = requestAnimationFrame(draw);
            }
        }

        document.getElementById('btnPlay').addEventListener('click', (e) => {
            isPlaying = !isPlaying;
            e.target.textContent = isPlaying ? '⏸ Pause' : '▶ Play';
            e.target.className = isPlaying ? 'paused' : '';
            if (isPlaying) draw();
            else cancelAnimationFrame(animationId);
        });

        document.getElementById('btnReset').addEventListener('click', () => {
            time = 0;
            history.length = 0;
            if (!isPlaying) draw();
        });

        setTimeout(resize, 100);
    </script>
</body>
</html>
