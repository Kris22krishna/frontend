<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra Balancer: The Golden Rule</title>
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --text: #f8fafc;
            --muted: #94a3b8;
            --primary: #8b5cf6;
            --primary-hover: #7c3aed;
            --success: #10b981;
            --danger: #ef4444;
            --box-color: #f43f5e;
            --unit-color: #38bdf8;
        }

        * {
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .header {
            text-align: center;
            padding: 24px;
            background: linear-gradient(180deg, rgba(30,41,59,1) 0%, rgba(30,41,59,0) 100%);
        }

        h1 {
            margin: 0 0 8px 0;
            font-size: 2.5rem;
            background: linear-gradient(135deg, #a78bfa, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
        }

        .equation-display {
            font-size: 3rem;
            font-weight: 800;
            font-family: monospace;
            letter-spacing: 2px;
            margin: 10px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .eq-side {
            padding: 10px 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            min-width: 150px;
            transition: all 0.3s;
        }

        .main-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: stretch;
            padding: 20px;
            gap: 40px;
            position: relative;
        }

        .scale-container {
            width: 800px;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            padding-bottom: 50px;
        }

        .scale-base {
            width: 120px;
            height: 120px;
            border-bottom: 60px solid var(--surface);
            border-left: 60px solid transparent;
            border-right: 60px solid transparent;
            position: relative;
            z-index: 10;
        }

        .scale-beam {
            width: 600px;
            height: 12px;
            background: #cbd5e1;
            position: absolute;
            bottom: 110px;
            border-radius: 6px;
            transform-origin: center;
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 5;
        }

        .scale-pivot {
            width: 24px;
            height: 24px;
            background: var(--primary);
            border-radius: 50%;
            position: absolute;
            bottom: 104px;
            z-index: 15;
            box-shadow: 0 0 15px var(--primary);
        }

        .pan-container {
            position: absolute;
            top: 0;
            width: 200px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .pan-container.left { left: 0; transform-origin: top center; transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .pan-container.right { right: 0; transform-origin: top center; transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }

        .pan-strings {
            width: 100%;
            height: 150px;
            border-left: 2px solid #94a3b8;
            border-right: 2px solid #94a3b8;
        }

        .pan-surface {
            width: 100%;
            height: 20px;
            background: linear-gradient(180deg, #64748b, #475569);
            border-radius: 0 0 50% 50%;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            position: relative;
        }

        .items-area {
            position: absolute;
            bottom: 20px;
            width: 100%;
            display: flex;
            flex-wrap: wrap-reverse;
            justify-content: center;
            align-content: flex-start;
            gap: 4px;
            padding: 0 10px;
        }

        .item {
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 18px;
            color: #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            border: 2px solid rgba(255,255,255,0.2);
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .item-x {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #f43f5e, #e11d48);
            border-radius: 12px;
        }

        .item-1 {
            width: 35px;
            height: 35px;
            background: linear-gradient(135deg, #0ea5e9, #0284c7);
            border-radius: 50%;
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .controls-panel {
            width: 300px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            backdrop-filter: blur(10px);
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .control-group h3 {
            margin: 0;
            font-size: 1rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 8px;
        }

        .btn-row {
            display: flex;
            gap: 8px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn-add-x { background: rgba(244,63,94,0.2); color: #f43f5e; border: 1px solid rgba(244,63,94,0.3); }
        .btn-add-x:hover { background: rgba(244,63,94,0.4); }
        
        .btn-add-1 { background: rgba(14,165,233,0.2); color: #38bdf8; border: 1px solid rgba(14,165,233,0.3); }
        .btn-add-1:hover { background: rgba(14,165,233,0.4); }

        .btn-rem { background: rgba(255,255,255,0.1); color: #fff; }
        .btn-rem:hover { background: rgba(255,255,255,0.2); }

        .action-btn { background: var(--primary); font-size: 18px; padding: 16px; margin-top: auto; }
        .action-btn:hover { background: var(--primary-hover); transform: translateY(-2px); box-shadow: 0 8px 20px rgba(139,92,246,0.4); }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 100px;
            font-weight: 700;
            font-size: 18px;
            margin-top: 10px;
            transition: all 0.3s;
        }

        .status-balanced { background: rgba(16,185,129,0.2); color: var(--success); border: 1px solid rgba(16,185,129,0.3); }
        .status-unbalanced { background: rgba(239,68,68,0.2); color: var(--danger); border: 1px solid rgba(239,68,68,0.3); }

        .puzzle-overlay {
            position: absolute;
            inset: 0;
            background: rgba(15,23,42,0.9);
            backdrop-filter: blur(5px);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s;
        }

        .puzzle-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .puzzle-box {
            background: var(--surface);
            padding: 40px;
            border-radius: 24px;
            border: 2px solid var(--primary);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            max-width: 500px;
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: #f00;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Balance the Equation</h1>
        <div class="equation-display">
            <div class="eq-side" id="eq-left">2x + 1</div>
            <span id="eq-sign">=</span>
            <div class="eq-side" id="eq-right">7</div>
        </div>
        <div id="status-indicator" class="status-badge status-balanced">
            <span>⚖️</span> Balanced
        </div>
    </div>

    <div class="main-container">
        <!-- LEFT CONTROLS -->
        <div class="controls-panel">
            <div class="control-group">
                <h3>Left Side of =</h3>
                <div class="btn-row">
                    <button class="btn-add-x" onclick="modify('left', 'x', 1)">+ X</button>
                    <button class="btn-rem" onclick="modify('left', 'x', -1)">- X</button>
                </div>
                <div class="btn-row">
                    <button class="btn-add-1" onclick="modify('left', '1', 1)">+ 1</button>
                    <button class="btn-rem" onclick="modify('left', '1', -1)">- 1</button>
                </div>
            </div>
            
            <div style="flex:1"></div>
            <p style="color:var(--muted); font-size: 14px; line-height: 1.5;">
                <strong>Golden Rule:</strong> Whatever you do to one side of an equation, you MUST do to the other side to keep it balanced!
            </p>
        </div>

        <!-- THE SCALE -->
        <div class="scale-container">
            <div class="scale-beam" id="scale-beam">
                <!-- Left Pan -->
                <div class="pan-container left" id="pan-left">
                    <div class="pan-strings"></div>
                    <div class="pan-surface">
                        <div class="items-area" id="items-left"></div>
                    </div>
                </div>
                <!-- Right Pan -->
                <div class="pan-container right" id="pan-right">
                    <div class="pan-strings"></div>
                    <div class="pan-surface">
                        <div class="items-area" id="items-right"></div>
                    </div>
                </div>
            </div>
            <div class="scale-pivot"></div>
            <div class="scale-base"></div>
        </div>

        <!-- RIGHT CONTROLS -->
        <div class="controls-panel">
            <div class="control-group">
                <h3>Right Side of =</h3>
                <div class="btn-row">
                    <button class="btn-add-x" onclick="modify('right', 'x', 1)">+ X</button>
                    <button class="btn-rem" onclick="modify('right', 'x', -1)">- X</button>
                </div>
                <div class="btn-row">
                    <button class="btn-add-1" onclick="modify('right', '1', 1)">+ 1</button>
                    <button class="btn-rem" onclick="modify('right', '1', -1)">- 1</button>
                </div>
            </div>
            
            <div style="flex:1"></div>
            <button class="action-btn" onclick="nextPuzzle()">Next Puzzle ➡️</button>
        </div>
    </div>

    <div class="puzzle-overlay" id="victory-overlay">
        <div class="puzzle-box">
            <div style="font-size: 60px; margin-bottom: 20px;">🏆</div>
            <h2 style="margin:0 0 10px; font-size:2rem;">Equation Solved!</h2>
            <p style="font-size:1.2rem; color:var(--muted); margin-bottom: 30px;">You successfully isolated X and kept the scale perfectly balanced.</p>
            <button class="action-btn" style="width:100%" onclick="nextPuzzle()">Bring on the next one!</button>
        </div>
    </div>

    <script>
        const puzzleBank = [
            { left: {x: 2, num: 1}, right: {x: 0, num: 7}, xValue: 3 },
            { left: {x: 1, num: 4}, right: {x: 0, num: 9}, xValue: 5 },
            { left: {x: 3, num: 2}, right: {x: 1, num: 10}, xValue: 4 },
            { left: {x: 4, num: 0}, right: {x: 2, num: 6}, xValue: 3 }
        ];

        let currentPuzzle = 0;
        let state = {
            left: {x: 0, num: 0},
            right: {x: 0, num: 0},
            xValue: 3
        };

        const DONT_RENDER = window.location.search.includes('mini');
        if(DONT_RENDER){
            document.querySelectorAll('.controls-panel').forEach(e => e.style.transform = 'scale(0.8)');
        }

        function loadPuzzle(idx) {
            const p = puzzleBank[idx];
            state.left = {...p.left};
            state.right = {...p.right};
            state.xValue = p.xValue;
            document.getElementById('victory-overlay').classList.remove('active');
            updateUI();
        }

        function nextPuzzle() {
            currentPuzzle = (currentPuzzle + 1) % puzzleBank.length;
            loadPuzzle(currentPuzzle);
        }

        function modify(side, type, amount) {
            if (type === 'x') {
                if (state[side].x + amount < 0) return;
                state[side].x += amount;
            } else {
                if (state[side].num + amount < 0) return;
                state[side].num += amount;
            }
            updateUI();
            checkVictory();
        }

        function formatEq(s) {
            let parts = [];
            if (s.x > 0) parts.push(`${s.x > 1 ? s.x : ''}x`);
            if (s.num > 0) parts.push(`${s.num}`);
            if (parts.length === 0) return '0';
            return parts.join(' + ');
        }

        function updateUI() {
            // Update Equation Text
            document.getElementById('eq-left').innerText = formatEq(state.left);
            document.getElementById('eq-right').innerText = formatEq(state.right);

            // Calculate Weights
            const weightLeft = (state.left.x * state.xValue) + state.left.num;
            const weightRight = (state.right.x * state.xValue) + state.right.num;

            // Tilt Physics
            const diff = weightRight - weightLeft;
            const maxTilt = 20; // degrees
            // Clamp roughly
            let tilt = diff * 2; 
            if (tilt > maxTilt) tilt = maxTilt;
            if (tilt < -maxTilt) tilt = -maxTilt;

            const beam = document.getElementById('scale-beam');
            const panLeft = document.getElementById('pan-left');
            const panRight = document.getElementById('pan-right');

            beam.style.transform = `rotate(${tilt}deg)`;
            // Counter-rotate pans to keep them hanging straight down
            panLeft.style.transform = `rotate(${-tilt}deg)`;
            panRight.style.transform = `rotate(${-tilt}deg)`;

            // Update Status Badge
            const status = document.getElementById('status-indicator');
            const eqSign = document.getElementById('eq-sign');
            if (weightLeft === weightRight) {
                status.className = 'status-badge status-balanced';
                status.innerHTML = '<span>⚖️</span> Balanced';
                eqSign.innerText = '=';
                eqSign.style.color = 'var(--text)';
            } else {
                status.className = 'status-badge status-unbalanced';
                status.innerHTML = '<span>⚠️</span> Tilted!';
                eqSign.innerText = weightLeft > weightRight ? '>' : '<';
                eqSign.style.color = 'var(--danger)';
            }

            // Render Items in Pans
            renderItems('left', state.left);
            renderItems('right', state.right);
        }

        function renderItems(side, data) {
            const container = document.getElementById(`items-${side}`);
            container.innerHTML = '';
            
            for(let i=0; i<data.x; i++) {
                const el = document.createElement('div');
                el.className = 'item item-x';
                el.innerText = 'x';
                container.appendChild(el);
            }
            
            for(let i=0; i<data.num; i++) {
                const el = document.createElement('div');
                el.className = 'item item-1';
                el.innerText = '1';
                container.appendChild(el);
            }
        }

        function checkVictory() {
            const weightLeft = (state.left.x * state.xValue) + state.left.num;
            const weightRight = (state.right.x * state.xValue) + state.right.num;

            if (weightLeft === weightRight) {
                // To win: isolated X. 
                // Either Left has 1 X and 0 nums, and Right has numbers. OR Vice Versa.
                const winLeft = state.left.x === 1 && state.left.num === 0 && state.right.x === 0;
                const winRight = state.right.x === 1 && state.right.num === 0 && state.left.x === 0;

                if (winLeft || winRight) {
                    setTimeout(() => {
                        document.getElementById('victory-overlay').classList.add('active');
                        createConfetti();
                    }, 500);
                }
            }
        }

        function createConfetti() {
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti');
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.backgroundColor = `hsl(${Math.random() * 360}, 100%, 50%)`;
                confetti.style.animation = `fall ${Math.random() * 3 + 2}s linear`;
                document.body.appendChild(confetti);
                setTimeout(() => confetti.remove(), 5000);
            }
        }

        loadPuzzle(0);
    </script>
    <style>
        @keyframes fall {
            to { transform: translateY(100vh) rotate(720deg); }
        }
    </style>
</body>
</html>
