<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Integers Balloon</title>
    <style>
        body { margin: 0; padding: 20px; font-family: 'Inter', system-ui, sans-serif; background: transparent; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow-x: hidden; }
        .is-mini body { padding: 0; justify-content: flex-start; }
        .header { text-align: center; margin-bottom: 20px; }
        .is-mini .header { display: none; }
        .container { background: #fff; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 100%; max-width: 900px; display: flex; flex-direction: row; border: 1px solid #e2e8f0; overflow: hidden; height: 500px; }
        .is-mini .container { box-shadow: none; border: none; height: 400px; max-width: 100%; }
        
        .controls { flex: 1; padding: 30px; display: flex; flex-direction: column; gap: 20px; justify-content: center; background: #f8fafc; border-right: 1px solid #e2e8f0; }
        .val-display { font-weight: 900; font-size: 32px; text-align: center; margin-bottom: 20px; }
        
        .btn-group { display: flex; gap: 10px; }
        button { flex: 1; border: none; padding: 15px; border-radius: 12px; font-weight: 800; font-size: 16px; cursor: pointer; transition: all 0.2s; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        button:hover { transform: translateY(-2px); }
        button:active { transform: translateY(0); }
        
        .btn-heat { background: #fee2e2; color: #ef4444; box-shadow: 0 4px 10px rgba(239, 68, 68, 0.2); }
        .btn-heat:hover { background: #fecaca; }
        .btn-sand { background: #e0e7ff; color: #6366f1; box-shadow: 0 4px 10px rgba(99, 102, 241, 0.2); }
        .btn-sand:hover { background: #c7d2fe; }

        .scene { flex: 2; position: relative; background: linear-gradient(to bottom, #38bdf8 0%, #e0f2fe 50%, #fef3c7 50%, #d97706 100%); background-size: 100% 200%; background-position: center 50%; transition: background-position 0.5s ease; overflow: hidden; }
        
        .altitude-marker { position: absolute; right: 0; width: 50px; height: 100%; border-left: 2px dashed rgba(255,255,255,0.5); display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .alt-tick { width: 10px; height: 2px; background: rgba(255,255,255,0.8); margin: 20px 0; position: relative; }
        .alt-text { position: absolute; right: 15px; top: -8px; color: rgba(255,255,255,0.9); font-weight: 700; font-size: 12px; }

        .balloon { position: absolute; left: 50%; top: 50%; width: 80px; height: 100px; margin-left: -40px; margin-top: -50px; font-size: 60px; line-height: 1; text-align: center; transition: top 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); filter: drop-shadow(0 10px 10px rgba(0,0,0,0.2)); z-index: 10; }
        
        .sea-level { position: absolute; left: 0; top: 50%; width: 100%; height: 2px; background: rgba(255,255,255,0.5); z-index: 5; }
        .sea-level-text { position: absolute; left: 10px; top: 50%; margin-top: -20px; color: rgba(255,255,255,0.8); font-weight: 800; font-size: 12px; }

        .eq-log { font-family: monospace; font-size: 16px; color: #475569; background: #fff; padding: 10px; border-radius: 8px; border: 1px solid #cbd5e1; height: 100px; overflow-y: auto; display: flex; flex-direction: column; gap: 5px; }
        .log-item { display: flex; justify-content: space-between; }
        .log-pos { color: #ef4444; }
        .log-neg { color: #6366f1; }

        @media (max-width: 768px) {
            body {
                min-height: 100dvh;
                height: auto;
                padding: 14px 12px 24px;
                justify-content: flex-start;
                overflow-y: auto;
            }

            .page {
                width: 100%;
            }

            .header {
                margin-bottom: 14px;
            }

            .header h1 {
                font-size: clamp(24px, 8vw, 32px) !important;
            }

            .header p {
                font-size: 14px;
                line-height: 1.45;
            }

            .container {
                flex-direction: column;
                height: auto;
                max-width: 100%;
            }

            .controls {
                border-right: none;
                border-bottom: 1px solid #e2e8f0;
                padding: 18px 16px;
            }

            .scene {
                min-height: 320px;
            }

            .btn-group {
                flex-direction: column;
            }

            .val-display {
                font-size: 24px;
                margin-bottom: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1 style="margin: 0 0 10px; font-weight: 900; font-size: 32px; color: #0f172a;">Integer Balloon</h1>
        <p style="margin: 0; color: #64748b; font-size: 16px;">Heat rises (+), Sandbags weigh you down (-).</p>
    </div>

    <div class="container">
        <div class="controls">
            <div class="val-display" id="altDisplay" style="color: #0f172a;">Altitude: <span id="altVal">0</span></div>
            
            <div class="btn-group">
                <button class="btn-heat" onclick="changeAlt(1)">
                    <span style="font-size: 24px;">🔥</span>
                    Heat (+1)
                </button>
                <button class="btn-sand" onclick="changeAlt(-1)">
                    <span style="font-size: 24px;">🪨</span>
                    Sandbag (-1)
                </button>
            </div>

            <div class="eq-log" id="eqLog">
                <div class="log-item" style="color:#94a3b8; text-align:center; display:block;">Start at 0</div>
            </div>
            <button onclick="reset()" style="background: #e2e8f0; color: #475569; width: 100%; padding: 10px;">Reset</button>
        </div>

        <div class="scene" id="scene">
            <div class="sea-level"></div>
            <div class="sea-level-text">SEA LEVEL 0</div>
            <div class="balloon" id="balloon">🎈</div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('mini') === 'true') { document.documentElement.classList.add('is-mini'); }

        let altitude = 0;
        const maxAlt = 5;
        const balloon = document.getElementById('balloon');
        const altVal = document.getElementById('altVal');
        const eqLog = document.getElementById('eqLog');
        const scene = document.getElementById('scene');

        function changeAlt(delta) {
            const prev = altitude;
            altitude += delta;
            
            if(altitude > maxAlt) altitude = maxAlt;
            if(altitude < -maxAlt) altitude = -maxAlt;

            // Visual updates
            const actualDelta = altitude - prev;
            if(actualDelta === 0) return;

            // Update balloon position (50% is 0, each unit is 10%)
            const topPos = 50 - (altitude * 10);
            balloon.style.top = topPos + '%';

            // Update background mapping (Parallax effect)
            const bgPos = 50 + (altitude * 5);
            scene.style.backgroundPosition = `center ${bgPos}%`;

            // Color coding
            altVal.innerText = altitude > 0 ? '+' + altitude : altitude;
            altVal.style.color = altitude > 0 ? '#ef4444' : (altitude < 0 ? '#6366f1' : '#0f172a');

            // Log
            const entry = document.createElement('div');
            entry.className = 'log-item';
            const sign = delta > 0 ? '+' : '';
            const actionClass = delta > 0 ? 'log-pos' : 'log-neg';
            entry.innerHTML = `<span><span class="${actionClass}">${sign}${delta}</span> added</span> <strong>= ${altitude}</strong>`;
            eqLog.appendChild(entry);
            eqLog.scrollTop = eqLog.scrollHeight;
        }

        function reset() {
            altitude = 0;
            balloon.style.top = '50%';
            scene.style.backgroundPosition = 'center 50%';
            altVal.innerText = '0';
            altVal.style.color = '#0f172a';
            eqLog.innerHTML = '<div class="log-item" style="color:#94a3b8; text-align:center; display:block;">Start at 0</div>';
        }
    </script>
</body>
</html>
