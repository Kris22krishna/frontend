<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculus: The Derivative (Rate of Change)</title>
    <style>
        :root {
            --bg: #020617;
            --surface: #0f172a;
            --text: #f8fafc;
            --muted: #64748b;
            --primary: #14b8a6;
            --accent: #f43f5e;
            --curve: #3b82f6;
        }

        * {
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            background-image: 
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .header {
            text-align: center;
            padding: 24px;
            background: linear-gradient(180deg, var(--surface) 0%, rgba(15,23,42,0) 100%);
            z-index: 10;
        }

        h1 {
            margin: 0 0 8px 0;
            font-size: 2.5rem;
            background: linear-gradient(135deg, #2dd4bf, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
        }

        .main-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        /* SVG Graph Area */
        .graph-container {
            width: 800px;
            height: 400px;
            position: relative;
        }

        svg {
            width: 100%;
            height: 100%;
            overflow: visible;
        }

        .axis {
            stroke: var(--muted);
            stroke-width: 2;
        }

        .curve {
            fill: none;
            stroke: var(--curve);
            stroke-width: 4;
            stroke-linecap: round;
            filter: drop-shadow(0 0 8px rgba(59,130,246,0.5));
        }

        .tangent-line {
            stroke: var(--accent);
            stroke-width: 3;
            stroke-dasharray: 8 6;
            transition: stroke 0.3s;
        }

        .point {
            fill: #fff;
            stroke: var(--primary);
            stroke-width: 4;
            cursor: pointer;
            filter: drop-shadow(0 0 10px var(--primary));
            transition: r 0.2s;
        }
        
        .point:hover { r: 10; }

        .slope-triangle {
            fill: none;
            stroke: #2dd4bf;
            stroke-width: 2;
            stroke-dasharray: 4;
            opacity: 0.7;
        }

        /* UI Controls at bottom */
        .controls-panel {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 700px;
            background: rgba(15,23,42,0.85);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 24px 32px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            backdrop-filter: blur(15px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            z-index: 20;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        input[type=range] {
            flex: 1;
            -webkit-appearance: none;
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            outline: none;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--primary);
            cursor: pointer;
            box-shadow: 0 0 15px var(--primary);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .stat-box {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .stat-label {
            font-size: 13px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 28px;
            font-family: monospace;
            font-weight: 800;
            color: #fff;
        }

        .stat-desc {
            font-size: 14px;
            color: #94a3b8;
            margin-top: 4px;
        }

        .highlight-red { color: var(--accent); }
        .highlight-blue { color: var(--curve); }
        .highlight-green { color: #10b981; }

    </style>
</head>
<body>

    <div class="header">
        <h1>The Derivative in Action</h1>
        <p style="color:var(--muted); font-size: 1.1rem;">Move the slider to see how the <strong>instantaneous rate of change</strong> (slope) evolves.</p>
    </div>

    <div class="main-container">
        <div class="graph-container">
            <svg id="calc-graph" viewBox="0 0 800 400">
                <!-- Axes -->
                <line x1="50" y1="350" x2="750" y2="350" class="axis" marker-end="url(#arrow)"/>
                <line x1="50" y1="350" x2="50" y2="50" class="axis" marker-end="url(#arrow)"/>
                
                <defs>
                    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
                        <path d="M0,0 L0,6 L9,3 z" fill="#64748b" />
                    </marker>
                </defs>

                <!-- Curve Path -->
                <path id="curve-path" class="curve" d=""></path>

                <!-- Slope Triangle -->
                <path id="slope-triangle" class="slope-triangle" d=""/>

                <!-- Tangent Line -->
                <line id="tangent-line" class="tangent-line" x1="0" y1="0" x2="0" y2="0" />

                <!-- The Moving Point -->
                <circle id="moving-point" class="point" cx="0" cy="0" r="7" />
            </svg>
        </div>
    </div>

    <div class="controls-panel">
        <div class="slider-container">
            <span style="font-weight:800; color:var(--muted); font-family:monospace;">x = <span id="x-display" style="color:#fff;">0</span></span>
            <input type="range" id="x-slider" min="0" max="600" value="100">
        </div>
        
        <div class="stats-grid">
            <div class="stat-box">
                <div class="stat-label">Function Value f(x)</div>
                <div class="stat-value highlight-blue" id="fx-display">0.00</div>
                <div class="stat-desc">The height of the curve (position).</div>
            </div>
            <div class="stat-box" style="border-color: rgba(244,63,94,0.3); background: rgba(244,63,94,0.05);">
                <div class="stat-label">Derivative f'(x)</div>
                <div class="stat-value highlight-red" id="deriv-display">0.00</div>
                <div class="stat-desc" id="deriv-desc">The steepness of the tangent line.</div>
            </div>
        </div>
    </div>

    <script>
        // Disable full UI if 'mini' is passed
        if(window.location.search.includes('mini')){
            const cp = document.querySelector('.controls-panel');
            cp.style.transform = 'translateX(-50%) scale(0.7)';
            cp.style.bottom = '10px';
        }

        const slider = document.getElementById('x-slider');
        const curvePath = document.getElementById('curve-path');
        const point = document.getElementById('moving-point');
        const tangentLine = document.getElementById('tangent-line');
        const slopeTriangle = document.getElementById('slope-triangle');
        
        const xDisplay = document.getElementById('x-display');
        const fxDisplay = document.getElementById('fx-display');
        const derivDisplay = document.getElementById('deriv-display');
        const derivDesc = document.getElementById('deriv-desc');

        // Math Function Definition
        // y = A * sin(B*x) + C*x + D
        // Let's use a cubic function for interesting peaks and valleys
        function f(x) {
            // Scale x down for math
            const nx = x / 100;
            const y = 80 * Math.sin(nx * 1.5) + nx * 20; 
            return y;
        }

        // Derivative Function
        function fPrime(x) {
            const nx = x / 100;
            // derivative of 80*sin(1.5x) + 20x 
            // = 80 * 1.5 * cos(1.5x) + 20 = 120 * cos(1.5x) + 20
            return (120 * Math.cos(nx * 1.5) + 20) / 100; // scaled
        }

        // Generate Curve Path
        function drawCurve() {
            let path = "";
            for (let x = 0; x <= 650; x += 5) {
                const y = 350 - f(x); // SVG y is inverted (0 is top)
                const realX = 50 + x;
                if (x === 0) path += `M ${realX} ${y} `;
                else path += `L ${realX} ${y} `;
            }
            curvePath.setAttribute('d', path);
        }

        function updateTangent(x) {
            const y = f(x);
            const m = fPrime(x);
            
            const realX = 50 + x;
            const realY = 350 - y; // Screen Y

            point.setAttribute('cx', realX);
            point.setAttribute('cy', realY);

            // Draw tangent line
            const tangentLength = 150; // pixels in x direction
            // y2 - y1 = m * (x2 - x1)
            // Screen coordinates means slope is inverted visually: -m
            
            const x1 = realX - tangentLength;
            const y1 = realY - (-m * -tangentLength);
            
            const x2 = realX + tangentLength;
            const y2 = realY - (-m * tangentLength);

            tangentLine.setAttribute('x1', x1);
            tangentLine.setAttribute('y1', y1);
            tangentLine.setAttribute('x2', x2);
            tangentLine.setAttribute('y2', y2);

            // Draw slope triangle
            const ds = 80;
            const tx2 = realX + ds;
            const ty2 = realY - (-m * ds);
            slopeTriangle.setAttribute('d', `M ${realX} ${realY} L ${tx2} ${realY} L ${tx2} ${ty2}`);

            // Update UI
            xDisplay.innerText = (x/100).toFixed(1);
            fxDisplay.innerText = (y/50).toFixed(2);
            derivDisplay.innerText = m.toFixed(2);

            if (m > 0.1) {
                derivDesc.innerText = "📈 The function is INCREASING.";
                derivDisplay.style.color = "#10b981"; // green
                tangentLine.style.stroke = "#10b981";
            } else if (m < -0.1) {
                derivDesc.innerText = "📉 The function is DECREASING.";
                derivDisplay.style.color = "#ef4444"; // red
                tangentLine.style.stroke = "#ef4444";
            } else {
                derivDesc.innerText = "⚖️ Critical Point (Turning Point!).";
                derivDisplay.style.color = "#f59e0b"; // yellow
                tangentLine.style.stroke = "#f59e0b";
            }
        }

        slider.addEventListener('input', (e) => {
            updateTangent(parseFloat(e.target.value));
        });

        // Initialize display
        drawCurve();
        updateTangent(slider.value);

    </script>
</body>
</html>
