<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rational Density</title>
    <style>
        body { margin: 0; padding: 20px; font-family: 'Inter', system-ui, sans-serif; background: transparent; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .is-mini body { padding: 0; justify-content: flex-start; }
        .header { text-align: center; margin-bottom: 20px; }
        .is-mini .header { display: none; }
        .container { background: #fff; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 100%; max-width: 900px; padding: 40px; border: 1px solid #e2e8f0; display: flex; flex-direction: column; gap: 30px; }
        .is-mini .container { box-shadow: none; border: none; padding: 20px; padding-top:40px; max-width: 100%; }
        
        .zoom-window { position: relative; width: 100%; height: 150px; background: #f8fafc; border-radius: 16px; border: 2px solid #e2e8f0; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .main-line { position: absolute; width: 80%; height: 4px; background: #94a3b8; border-radius: 2px; }
        
        .marker { position: absolute; display: flex; flex-direction: column; align-items: center; top: 50%; transform: translateY(-50%); transition: left 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .tick { width: 4px; height: 30px; background: #64748b; border-radius: 2px; }
        .label { margin-top: 10px; font-weight: 800; font-size: 20px; color: #334155; }
        .label-frac { display: flex; flex-direction: column; align-items: center; line-height: 1.1; }
        .label-frac span:first-child { border-bottom: 2px solid #334155; padding: 0 2px; }

        .btn-panel { display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .btn-split { background: linear-gradient(135deg, #a855f7, #c084fc); color: white; border: none; padding: 16px 32px; border-radius: 12px; font-weight: 900; font-size: 18px; cursor: pointer; transition: all 0.2s; box-shadow: 0 6px 20px rgba(168, 85, 247, 0.3); }
        .btn-split:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(168, 85, 247, 0.4); }
        .btn-split:active { transform: translateY(0); }
        .btn-reset { background: transparent; color: #94a3b8; border: none; font-weight: 700; cursor: pointer; }
        .btn-reset:hover { color: #64748b; }
        
        .info-text { text-align: center; font-size: 16px; color: #64748b; font-weight: 500; }
        .highlight { color: #a855f7; font-weight: 800; }

        .midpoint { opacity: 0; animation: dropIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; z-index: 10; }
        .midpoint .tick { background: #a855f7; width: 6px; height: 36px; }
        .midpoint .label { color: #a855f7; }
        .midpoint .label-frac span:first-child { border-bottom: 2px solid #a855f7; }

        @keyframes dropIn { 0% { transform: translate(-50%, -150%); opacity: 0; } 100% { transform: translate(-50%, -50%); opacity: 1; } }
    </style>
</head>
<body>
    <div class="header">
        <h1 style="margin: 0 0 10px; font-weight: 900; font-size: 32px; color: #0f172a;">Infinite Density</h1>
        <p style="margin: 0; color: #64748b; font-size: 16px;">There is always a rational number perfectly between any two rational numbers.</p>
    </div>

    <div class="container">
        <div class="zoom-window">
            <div class="main-line"></div>
            
            <div class="marker" id="markerLeft" style="left: 10%;">
                <div class="tick"></div>
                <div class="label" id="lblLeft">0</div>
            </div>
            
            <div class="marker" id="markerRight" style="left: 90%;">
                <div class="tick"></div>
                <div class="label" id="lblRight">1</div>
            </div>

            <!-- Midpoint injected here -->
        </div>

        <div class="info-text" id="infoText">
            Gap: <span class="highlight">1</span>
        </div>

        <div class="btn-panel">
            <button class="btn-split" id="btnZoom" onclick="zoomIn()">🔍 Find Midpoint & Zoom</button>
            <button class="btn-reset" onclick="reset()">Reset</button>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('mini') === 'true') { document.documentElement.classList.add('is-mini'); }

        let zoomLevel = 0; // powers of 2
        
        const zoomWindow = document.querySelector('.zoom-window');
        const markerLeft = document.getElementById('markerLeft');
        const markerRight = document.getElementById('markerRight');
        const lblLeft = document.getElementById('lblLeft');
        const lblRight = document.getElementById('lblRight');
        const infoText = document.getElementById('infoText');
        const btnZoom = document.getElementById('btnZoom');

        let isAnimating = false;

        function fracHtml(num, den) {
            return `<div class="label-frac"><span>${num}</span><span>${den}</span></div>`;
        }

        function zoomIn() {
            if(isAnimating) return;
            isAnimating = true;

            const den = Math.pow(2, zoomLevel + 1);
            const numMid = 1; // we'll always zoom between 0 and 1/(2^n)

            // Step 1: Drop midpoint
            const midMarker = document.createElement('div');
            midMarker.className = 'marker midpoint';
            midMarker.style.left = '50%';
            midMarker.innerHTML = `<div class="tick"></div><div class="label">${fracHtml(1, den)}</div>`;
            zoomWindow.appendChild(midMarker);

            // Step 2: Animate zoom after a brief pause
            setTimeout(() => {
                // The new boundaries will be 0 and 1/den. We shift the right marker out.
                // Left marker stays at 10%. Mid marker goes to 90%.
                midMarker.style.transition = 'left 0.8s cubic-bezier(0.34, 1.56, 0.64, 1)';
                
                markerRight.style.left = '150%'; // Pushed off screen
                midMarker.style.left = '90%';

                setTimeout(() => {
                    // Cleanup and reset states logic visually (hard reset DOM to look like end state)
                    zoomLevel++;
                    
                    lblLeft.innerHTML = '0';
                    lblRight.innerHTML = fracHtml(1, den);
                    
                    markerRight.style.transition = 'none';
                    markerRight.style.left = '90%';
                    
                    midMarker.remove();

                    infoText.innerHTML = `Gap: <span class="highlight">1/${den}</span>`;
                    
                    // Re-enable animation
                    setTimeout(() => {
                        markerRight.style.transition = 'left 0.8s cubic-bezier(0.34, 1.56, 0.64, 1)';
                        isAnimating = false;
                    }, 50);

                }, 800);
            }, 1000);
        }

        function reset() {
            if(isAnimating) return;
            zoomLevel = 0;
            lblLeft.innerHTML = '0';
            lblRight.innerHTML = '1';
            infoText.innerHTML = `Gap: <span class="highlight">1</span>`;
            document.querySelectorAll('.midpoint').forEach(e => e.remove());
        }
    </script>
</body>
</html>
